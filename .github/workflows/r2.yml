name: 吖吖

on:
  schedule:
    - cron: '0 23 * * *'  # UTC23=北京时间07
    - cron: '0 3 * * *'   # UTC3=北京时间11
    - cron: '0 10 * * *'  # UTC10=北京时间18
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Send Daily Reminder
        run: |
          messages=(
            "今天不用做到满分，能开始就很好。"
            "别小看每天20分钟，它会慢慢改变很多东西。"
            "保持好奇心，比保持动力更容易坚持。"
            "允许自己慢一点，但不要停下来。"
            "长期目标靠重复积累。"
            "困的时候休息也是任务的一部分。"
          )
          index=$((RANDOM % ${#messages[@]}))
          TODAY=$(TZ='Asia/Shanghai' date +%F)
          HOUR=$(TZ='Asia/Shanghai' date +%H)

          if [ "$HOUR" = "07" ]; then
            TITLE="🌅 早安"
            # $' 换行用\n，代码可以自由缩进，正文不会带入空格
            DESP=$'### 今日启动\n今天最重要的一件事：\n- [ ] __________\n\n随机鼓励：\n'${messages[$index]}$'\n\n📅 '${TODAY}

          elif [ "$HOUR" = "11" ]; then
            TITLE="☀️ 上午提醒"
            DESP=$'### 上午小提醒\n喝水了吗？起身活动了吗？\n\n随机鼓励：\n'${messages[$index]}$'\n\n📅 '${TODAY}

          else
            TITLE="🌙 晚间复盘"
            DESP=$'### 今日复盘\n- [ ] 学习\n- [ ] 运动\n- [ ] 推进一个小项目\n\n今天最满意的一件小事：\n- __________\n\n随机鼓励：\n'${messages[$index]}$'\n\n📅 '${TODAY}
          fi

          curl -s -X POST \
            "https://sctapi.ftqq.com/${SENDKEY}.send" \
            --data-urlencode "title=$TITLE" \
            --data-urlencode "desp=$DESP"
          echo "推送结果码:$?"
        env:
          SENDKEY: ${{ secrets.SENDKEY }}

name: 早安定时任务

on:
  schedule:
    - cron: '31 3 * * *'   # 12:31（KST）
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-latest

    steps:
      - name: 🧭 打印触发信息（关键）
        run: |
          echo "===== WORKFLOW STARTED ====="
          echo "时间(UTC): $(date -u)"
          echo "时间(Local): $(date)"
          echo "事件类型: $GITHUB_EVENT_NAME"
          echo "分支: $GITHUB_REF"
          echo "仓库: $GITHUB_REPOSITORY"

      - name: 🔑 检查 secret 是否存在
        run: |
          if [ -z "${{ secrets.SENDKEY }}" ]; then
            echo "❌ SENDKEY 没有读取到"
            exit 1
          else
            echo "✅ SENDKEY 存在（长度: ${#SENDKEY}）"
          fi
        env:
          SENDKEY: ${{ secrets.SENDKEY }}

      - name: 📡 发送微信通知（带完整返回）
        run: |
          echo "===== SENDING REQUEST ====="

          response=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
            "https://sctapi.ftqq.com/${{ secrets.SENDKEY }}.send" \
            --data-urlencode "title=⏰中午好～" \
            --data-urlencode "desp=记得吃饭🍱")

          echo "===== SERVER RESPONSE ====="
          echo "$response"

      - name: 🧾 结束标记
        run: echo "===== DONE ====="
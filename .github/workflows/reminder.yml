- name: 发送微信提醒
  run: |
    response=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
      "https://sctapi.ftqq.com/${{ secrets.SENDKEY }}.send" \
      --data-urlencode "title=⏰早吖，又是新的一天！今天也要加油吖！" \
      --data-urlencode "desp=今天也要推进一点点～")

    echo "===== Server酱返回 ====="
    echo "$response"
name: 早吖，又是新的一天！
on:
  schedule:
    - cron: '00 0 * * *'   # 每天 8:00 北京时间（对应 UTC 0:00）
  workflow_dispatch:        # 允许手动测试

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: 发送微信提醒
        uses: easychen/github-action-server-chan@v1.0.0
        with:
          sendkey: ${{ secrets.SENDKEY }}
          title: "⏰ 08:00 今天也要加油吖！"
          desp: "每天做一点，劳逸结合～"

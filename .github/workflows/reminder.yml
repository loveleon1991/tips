name: 早安

on:
  schedule:
    - cron: '19 4 * * *'
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-latest

    steps:
      - name: 发送微信提醒
        run: |
          curl "https://sctapi.ftqq.com/${{ secrets.SENDKEY }}.send" \
            --data-urlencode "title=⏰(๑＞ڡ＜)☆早吖，又是新的一天！今天也要加油吖！" \
            --data-urlencode "desp=今天也要推进一点点～"
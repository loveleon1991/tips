name: 吖吖

on:
schedule:
- cron: '0 23 * * *'  # 北京时间07:00
- cron: '0 3 * * *'   # 北京时间11:00
- cron: '0 10 * * *'  # 北京时间18:00

workflow_dispatch:

jobs:
remind:
runs-on: ubuntu-latest

steps:
  - name: Send Reminder
    run: |
      messages=(
        "今天不用做到满分，能开始就很好。"
        "别小看每天20分钟，它会慢慢改变很多东西。"
        "保持好奇心，比保持动力更容易坚持。"
        "允许自己慢一点，但不要停下来。"
        "长期目标靠重复积累。"
        "困的时候休息也是任务的一部分。"
      )

      index=$((RANDOM % ${#messages[@]}))
      HOUR=$(TZ='Asia/Shanghai' date +%H)
      TODAY=$(TZ='Asia/Shanghai' date +%F)

      if [ "$HOUR" = "07" ]; then
        TITLE="🌅 早安"
        DESP="今天最重要的一件事是什么？\n\n${messages[$index]}\n\n📅 $TODAY"

      elif [ "$HOUR" = "11" ]; then
        TITLE="☀️ 上午提醒"
        DESP="记得喝水、活动一下身体。\n\n${messages[$index]}\n\n📅 $TODAY"

      else
        TITLE="🌙 晚间复盘"
        DESP="今天完成了什么？\n学习 □\n运动 □\n项目 □\n\n${messages[$index]}\n\n📅 $TODAY"
      fi

      curl -X POST \
      "https://sctapi.ftqq.com/${{ secrets.SENDKEY }}.send" \
      --data-urlencode "title=$TITLE" \
      --data-urlencode "desp=$DESP"